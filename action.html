<html lang="ja">
<head>

  <style>
    :root{--bg:#f6f1e8;--paper:#fffaf2;--paper2:#fffdf8;--ink:#25221e;--muted:#71685d;--line:#dfd1bf;--accent:#7a5b32;--accent2:#9a7440;--soft:#efe3d0;--good:#2f7a4a;--mid:#a26716;--warn:#a33a2c;--shadow:0 18px 50px rgba(37,34,30,.12);--radius:26px}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:radial-gradient(circle at 10% 0,rgba(154,116,64,.18),transparent 34%),linear-gradient(180deg,#fbf7ee,var(--bg));color:var(--ink);line-height:1.7}.wrap{max-width:1120px;margin:0 auto;padding:30px 20px 64px}a{color:var(--accent);font-weight:900;text-decoration:none}.back{display:inline-flex;margin-bottom:22px;border-bottom:1px solid var(--soft)}
    .hero{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;align-items:stretch}.hero-main,.hero-side,.card,.prompt-card{background:rgba(255,250,242,.93);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.hero-main{padding:28px}.hero-side{padding:22px}h1{margin:0 0 10px;font-size:clamp(34px,5vw,60px);line-height:1.05;letter-spacing:-.055em}.lead{color:var(--muted);font-size:17px;margin:0}.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}.pill{border:1px solid var(--line);border-radius:999px;padding:7px 11px;background:#fffdf8;font-weight:900;font-size:13px}.route-title{font-size:14px;font-weight:900;color:var(--accent);margin:0 0 12px}.route{display:grid;gap:10px}.route-step{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start}.num{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:var(--ink);color:#fffaf2;font-size:12px;font-weight:900}.route-step b{display:block;line-height:1.35}.route-step span{display:block;color:var(--muted);font-size:13px;margin-top:2px}
    .section-title{display:flex;justify-content:space-between;gap:12px;align-items:end;margin:28px 0 12px}.section-title h2{margin:0;font-size:22px;letter-spacing:-.02em}.section-title p{margin:0;color:var(--muted);font-size:13px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.card{padding:18px;position:relative;overflow:hidden}.card::before{content:"";position:absolute;inset:0 0 auto;height:7px;background:var(--soft)}.card h3{margin:4px 0 8px;font-size:18px}.summary{margin:0 0 14px;color:var(--muted);font-size:14px}.item-list{display:grid;gap:10px}.item{background:rgba(255,255,255,.42);border:1px solid var(--line);border-radius:16px;padding:12px}.item b{display:block;font-size:14px;line-height:1.45}.item span{display:block;margin-top:4px;color:var(--muted);font-size:13px;line-height:1.55}.source.card::before{background:#b7cfbe}.question.card::before{background:#dfc18d}.field.card::before{background:#c8b89c}.output.card::before{background:#b8c8d0}
    .prompt-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.prompt-card{padding:18px}.prompt-card h3{margin:0 0 8px;font-size:16px}.prompt-card p{margin:0 0 12px;color:var(--muted);font-size:13px}.prompt{background:rgba(239,227,208,.62);border:1px solid var(--line);border-radius:16px;padding:13px;color:var(--ink);font-size:13px}.copy-note{margin-top:8px;color:var(--accent);font-weight:900;font-size:12px}.empty{background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:20px;color:var(--muted)}footer{color:var(--muted);font-size:13px;margin-top:34px}
    @media(max-width:900px){.hero{grid-template-columns:1fr}.grid,.prompt-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <a class="back" href="./">← 課題地図へ戻る</a>
    <section id="app"></section>
    <footer>Prototype by sirop-d with ChatGPT. Deep dive pages are designed as investigation boards, not final answers.</footer>
  </main>
  <script>
    const data={
      population:{title:"人口・家族・世代",summary:"少子化、高齢化、介護、世代間公平、単身化を、生活圏の詰まりとして確認する。",trust:"検証しやすい",sources:[{t:"国勢調査・人口推計",s:"人口の増減や年齢構成を、地域ごとに確認する入口。"},{t:"出生動向",s:"少子化がどの地域・世代で強く出ているかを見る。"},{t:"介護保険データ",s:"介護需要と担い手不足を、制度側の数字から見る。"},{t:"自治体別人口資料",s:"国全体では見えにくい生活圏ごとの偏りを確認する。"}],questions:[{t:"どこが詰まっているか？",s:"保育・住宅・雇用・介護のうち、生活を止めている要因を分ける。"},{t:"制度と生活時間は噛み合うか？",s:"窓口、通勤、保育、介護の時間割が現実に合っているか見る。"},{t:"支援の違いは何か？",s:"単身高齢者と子育て世帯を同じ“弱者”として雑に扱わない。"}],field:[{t:"生活導線を歩く",s:"駅前・住宅地・保育施設周辺を見て、日常の移動負荷を観察する。"},{t:"数字と街を見比べる",s:"人口推計と空き家、商店街、病院距離のズレを見る。"}],output:[{t:"詰まりポイント地図",s:"地域別に、何が生活を難しくしているかを視覚化する。"},{t:"インタビュー問いリスト",s:"当事者の言葉を拾うための質問を整理する。"},{t:"制度と実感のズレまとめ",s:"資料上は整って見える制度が、現場で届くかを記録する。"}]},
      work:{title:"人的資本・働き方・教育",summary:"賃金、教育、学び直しを、個人の努力論に閉じず、制度と現場の接続で見る。",trust:"追加検証",sources:[{t:"労働統計",s:"雇用形態や就業率を大づかみに見る土台。"},{t:"賃金統計",s:"どの層で賃金停滞が強いかを確認する。"},{t:"学校基本調査",s:"教育環境や進路の構造を把握する。"},{t:"企業調査",s:"企業側の人材需要と教育側のズレを見る。"}],questions:[{t:"制度は本当に使えるか？",s:"リスキリングが現場で使える導線になっているか見る。"},{t:"地域差はどこで広がるか？",s:"教育投資や学習機会の偏りを確認する。"},{t:"誰の賃金が止まるか？",s:"業種・年齢・雇用形態ごとに分けて見る。"}],field:[{t:"求人票を読む",s:"地域企業が何を求めているかを実際の募集条件から見る。"},{t:"学習拠点を歩く",s:"図書館、訓練校、学校へのアクセスを確認する。"}],output:[{t:"学び直し導線マップ",s:"学ぶ場所、費用、時間、就業への接続をまとめる。"},{t:"スキル需要メモ",s:"求人票から現場が求める能力を抽出する。"},{t:"届いていない層の仮説",s:"制度からこぼれる人を具体化する。"}]},
      fiscal:{title:"財政・社会保障・行政",summary:"給付と負担、行政効率化を、数字だけでなく説明可能性として見る。",trust:"検証しやすい",sources:[{t:"予算・決算資料",s:"お金の流れを確認する基礎資料。"},{t:"社会保障給付費",s:"医療・介護・年金などの大きな負担構造を見る。"},{t:"税制資料",s:"誰がどの形で負担しているかを見る。"},{t:"行政レビュー",s:"制度の重複や非効率を探す入口。"}],questions:[{t:"どこが重複しているか？",s:"似た制度が並び、利用者に分かりにくくなっていないか。"},{t:"合理的な不安は何か？",s:"増税や給付削減への反発を感情論だけで処理しない。"},{t:"誰が取り残されるか？",s:"行政DXで便利になる一方、使えない人が出ないか見る。"}],field:[{t:"手続き導線をたどる",s:"自治体サイトから実際に申請直前まで進んでみる。"},{t:"窓口とオンラインを比較",s:"紙・電話・Webでどれくらい分かりやすさが違うか見る。"}],output:[{t:"制度重複メモ",s:"似た制度や分かりにくい名前を整理する。"},{t:"手続き導線レビュー",s:"利用者目線で迷う場所を記録する。"},{t:"説明不足リスト",s:"負担と受益の納得感が弱い箇所をまとめる。"}]},
      region:{title:"地域・都市・インフラ",summary:"インフラ老朽化、空き家、公共交通を、数字と生活感のズレとして歩いて見る。",trust:"追加検証",sources:[{t:"自治体統計",s:"地域別の人口、施設、財政状況を確認する。"},{t:"空き家調査",s:"街の空洞化や住宅の余り方を見る。"},{t:"インフラデータ",s:"道路・橋梁・上下水道の老朽化を把握する。"},{t:"公共交通データ",s:"移動のしやすさと生活の成立条件を見る。"}],questions:[{t:"何を残し、何を畳むか？",s:"維持すべき公共資産の基準を考える。"},{t:"車なしで暮らせるか？",s:"公共交通が弱い場所の生活負荷を見る。"},{t:"統計と街は一致するか？",s:"空き家や商店街の変化を歩いて確かめる。"}],field:[{t:"駅前から歩く",s:"駅、バス停、商店街、住宅地を連続した生活導線として見る。"},{t:"時刻表と街を読む",s:"本数、空き店舗、歩道、照明、ベンチを記録する。"}],output:[{t:"街歩き観察ノート",s:"見えた違和感を写真と言葉で残す。"},{t:"公共交通の使いづらさ地図",s:"乗り換え、待ち時間、徒歩距離を地図化する。"},{t:"数字と現場のズレメモ",s:"統計では見えない生活感を補う。"}]},
      industry:{title:"産業・企業・経済成長",summary:"産業競争力を、企業数や投資額だけでなく、地域の承継・人材・販路で見る。",trust:"追加検証",sources:[{t:"経産省資料",s:"産業政策や支援制度の前提を確認する。"},{t:"企業統計",s:"企業数、規模、開廃業の傾向を見る。"},{t:"特許",s:"技術的な蓄積や競争力の一端を見る。"},{t:"資金調達データ",s:"成長分野にお金が流れているかを見る。"}],questions:[{t:"どこで詰まるか？",s:"承継・人材・資金・販路のボトルネックを分ける。"},{t:"支援は地域に届くか？",s:"スタートアップ施策が地場産業と接続しているか見る。"},{t:"淘汰と再生の線引きは？",s:"単なる弱者切り捨てになっていないか確認する。"}],field:[{t:"地場産業を歩く",s:"商店街、工場、店舗、求人掲示を観察する。"},{t:"空きテナントを見る",s:"産業構造の変化が街にどう出るかを記録する。"}],output:[{t:"地域産業の詰まりメモ",s:"どこで成長が止まっているか仮説化する。"},{t:"承継課題の仮説",s:"後継者、顧客、設備、資金の問題を分ける。"},{t:"生活者から見た産業変化",s:"景気の話を生活実感に翻訳する。"}]},
      environment:{title:"環境・エネルギー・防災",summary:"防災、電力、食料を、生活圏の弱点として地図化する。",trust:"検証しやすい",sources:[{t:"気象庁資料",s:"災害や気候の基礎データを確認する。"},{t:"防災白書",s:"国全体の防災課題と方針を見る。"},{t:"エネルギー統計",s:"電力や燃料の依存構造を見る。"},{t:"農業統計",s:"食料供給と地域農業の変化を見る。"}],questions:[{t:"地域の弱点は何か？",s:"避難・水害・電力・食料のどこに脆さがあるか。"},{t:"優先順位は伝わるか？",s:"防災投資の必要性が生活者に見える形になっているか。"},{t:"負担は誰に出るか？",s:"電気料金や再エネ立地の負担の偏りを見る。"}],field:[{t:"避難導線を歩く",s:"ハザードマップと実際の道、川、避難所を照合する。"},{t:"夜間や高齢者目線で見る",s:"昼間の安全だけでなく、弱い条件で歩いてみる。"}],output:[{t:"生活圏の脆弱点地図",s:"災害時に詰まりそうな場所を可視化する。"},{t:"避難導線チェックリスト",s:"距離、段差、照明、案内表示を点検する。"},{t:"防災と日常生活のズレ",s:"平時の便利さと非常時の弱さを比べる。"}]},
      digital:{title:"デジタル・AI・情報空間",summary:"AI、サイバー、偽情報を、便利さ・安全・自由の境界として見る。",trust:"変化が速い",sources:[{t:"サイバー被害統計",s:"被害の量と傾向を確認する。"},{t:"AI政策文書",s:"規制や活用方針の現在地を見る。"},{t:"行政DX資料",s:"行政サービスのデジタル化の進み具合を見る。"},{t:"透明性レポート",s:"プラットフォーム側の対応や限界を見る。"}],questions:[{t:"線引きはどこか？",s:"便利さ、安全、自由のバランスを見る。"},{t:"何が守られ、何が失われるか？",s:"AI規制の副作用を先に考える。"},{t:"誰が困るか？",s:"デジタル弱者が詰まる手続きを具体化する。"}],field:[{t:"行政手続きを試す",s:"実際に画面を進み、分かりにくい場所を見る。"},{t:"初心者目線で読む",s:"用語、導線、エラー表示の難しさを確認する。"}],output:[{t:"利用者目線レビュー",s:"便利さだけでなく迷いや不安も記録する。"},{t:"便利さと監視の論点整理",s:"安心と自由の境界を言葉にする。"},{t:"更新履歴つき制度メモ",s:"変化が速い領域なので日付を残す。"}]},
      democracy:{title:"民主主義・信頼・共生",summary:"孤独、政治参加、行政透明性を、制度と生活実感の距離で見る。",trust:"追加検証",sources:[{t:"世論調査",s:"意識や不満の大きな傾向を見る。"},{t:"投票率",s:"政治参加の状態を確認する。"},{t:"行政情報公開資料",s:"透明性の仕組みを確認する。"},{t:"孤独・孤立調査",s:"つながりの欠如を数字で見る。"}],questions:[{t:"届いていない人は誰か？",s:"制度はあるのに使えない人を探す。"},{t:"透明性と負担は両立するか？",s:"行政側の負担も含めて考える。"},{t:"反発の不安は何か？",s:"多様性施策への反発を雑に切り捨てない。"}],field:[{t:"地域の接点を歩く",s:"公民館、図書館、相談窓口を生活導線として見る。"},{t:"孤立しやすい場所を見る",s:"つながりが生まれる場所と切れる場所を観察する。"}],output:[{t:"地域の接点マップ",s:"人と制度が出会う場所を可視化する。"},{t:"制度と実感のズレメモ",s:"使えるはずの制度が届かない理由を見る。"},{t:"参加しやすさチェック",s:"政治・行政・地域活動への入口を点検する。"}]},
      security:{title:"外交・安全保障",summary:"公開情報で追える範囲と専門家判断が必要な範囲を分けて見る。",trust:"変化が速い",sources:[{t:"防衛白書",s:"防衛政策の公開情報を確認する。"},{t:"外交青書",s:"外交方針と国際環境を把握する。"},{t:"経済安全保障資料",s:"企業活動と安全保障の接点を見る。"},{t:"国際機関資料",s:"日本だけでなく国際的な比較軸を持つ。"}],questions:[{t:"公開情報でどこまで分かるか？",s:"推測と事実の境界を分ける。"},{t:"生活者への波及は何か？",s:"防衛費や規制の負担を日常に翻訳する。"},{t:"企業活動はどう変わるか？",s:"物流、調達、輸出入への影響を見る。"}],field:[{t:"公開資料と報道を比較",s:"言い切れることと言い切れないことを分ける。"},{t:"地域企業への影響を仮説化",s:"安全保障を遠い話で終わらせない。"}],output:[{t:"公開情報ベースの論点表",s:"根拠のある話と推測を分ける。"},{t:"専門家確認リスト",s:"判断に専門知が必要な問いを残す。"},{t:"生活者への波及メモ",s:"大きな政策を日常の変化に翻訳する。"}]}
    };
    const id=new URLSearchParams(location.search).get("topic")||"region";const item=data[id];const app=document.getElementById("app");
    const list=(arr)=>`<div class="item-list">${arr.map(x=>`<div class="item"><b>${x.t}</b><span>${x.s}</span></div>`).join("")}</div>`;
    const block=(cls,title,summary,arr)=>`<section class="card ${cls}"><h3>${title}</h3><p class="summary">${summary}</p>${list(arr)}</section>`;
    const prompts=(it)=>[
      {t:"調査計画を作る",s:"まず何を見るかを3段階に分ける。",p:`「${it.title}」について、現地観察・統計確認・note化の3段階で調査計画を作って。`},
      {t:"街歩きチェックリスト",s:"当日そのまま使える観察項目にする。",p:`「${it.title}」を街歩きで確認するためのチェックリストを、写真で撮るもの・メモするもの・人に聞くことに分けて作って。`},
      {t:"note構成案にする",s:"観察を発信に変換する。",p:`「${it.title}」について、AIの仮説と現場観察をつなげるnote記事の構成案を作って。導入・観察・考察・次回予告まで。`},
      {t:"X投稿に圧縮する",s:"共有しやすい短文にする。",p:`「${it.title}」の調査メモを、X投稿用に140字前後・スレッド3投稿・画像添付向けキャプションの3種類で作って。`},
      {t:"反対論を点検する",s:"一方通行の正義にしない。",p:`「${it.title}」の打ち手に対して、反対する立場・合理的な懸念・想定される副作用を整理して。`},
      {t:"次の深掘り問いを作る",s:"調査を連載化する。",p:`「${it.title}」をさらに深掘りするための問いを10個作って。現場で確かめられる問いを優先して。`}
    ];
    if(!item){app.innerHTML=`<div class="empty">該当する深掘りページがありません。<br><a href="./">課題地図へ戻る</a></div>`}else{document.title=`${item.title}｜次アクション深掘り`;app.innerHTML=`<section class="hero"><div class="hero-main"><h1>${item.title}</h1><p class="lead">${item.summary}</p><div class="meta"><span class="pill">検証性：${item.trust}</span><span class="pill">次アクション深掘り</span><span class="pill">調査ボード</span></div></div><aside class="hero-side"><p class="route-title">このページの読み方</p><div class="route"><div class="route-step"><div class="num">1</div><div><b>根拠を見る</b><span>どの資料から入るか決める。</span></div></div><div class="route-step"><div class="num">2</div><div><b>問いを選ぶ</b><span>現場で確かめる論点を絞る。</span></div></div><div class="route-step"><div class="num">3</div><div><b>観察して発信する</b><span>歩いた記録をnote/Xへ変換する。</span></div></div></div></aside></section><div class="section-title"><h2>調査ボード</h2><p>各項目に1〜2行のサマリーを付けました。</p></div><section class="grid">${block("source","まず見る根拠","資料の入口。最初に確認すると、議論の足場が安定します。",item.sources)}${block("question","検証したい問い","AIの結論に飛びつかず、人間が確かめるべき論点です。",item.questions)}${block("field","フィールドワーク案","歩く・見る・比べるための実践メニューです。",item.field)}${block("output","アウトプット案","調査した内容を、noteやXで共有できる形にします。",item.output)}</section><div class="section-title"><h2>次プロンプト提案</h2><p>ここからチャッピーに投げると、調査が続きます。</p></div><section class="prompt-grid">${prompts(item).map(x=>`<article class="prompt-card"><h3>${x.t}</h3><p>${x.s}</p><div class="prompt">${x.p}</div><div class="copy-note">コピーして次の会話へ</div></article>`).join("")}</section>`}
  </script>
</body>
</html>
